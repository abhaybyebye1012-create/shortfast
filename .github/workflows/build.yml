name: Build AppImage Fast
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libfuse2
          pip install ffsubsync Gooey nuitka zstandard

      - name: Compile with Nuitka
        run: |
          python -m nuitka --standalone --onefile \
          --enable-plugin=tk-inter \
          --include-package=ffsubsync \
          --linux-icon=utilities-terminal \
          --output-filename=ffsubsync-gui.AppImage \
          gui.py

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: FFsubsync-Portable
          path: "*.AppImage"
