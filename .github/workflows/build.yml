name: Build AppImage Fast
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libfuse2 libgtk-3-dev libnotify-dev \
          libsdl2-dev libwebkit2gtk-4.0-dev libxtst-dev

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          # Fetch pre-built wxPython to save 30 mins of build time
          pip install -U Gooey nuitka zstandard ffsubsync \
          -f https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-22.04

      - name: Build with Nuitka
        run: |
          python -m nuitka --standalone --onefile \
          --enable-plugin=tk-inter \
          --include-package=ffsubsync \
          --include-package=wx \
          --linux-icon=utilities-terminal \
          --output-filename=ffsubsync-gui.AppImage \
          --include-executable-dependency=/usr/bin/ffmpeg \
          --include-executable-dependency=/usr/bin/ffprobe \
          gui.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FFsubsync-AppImage
          path: ffsubsync-gui.AppImage
